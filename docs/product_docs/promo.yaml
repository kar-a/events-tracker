Акция: !concept
  определение: |
    Акции которые запланированы для проведения на сайте. Англ. Promotion. Контент-менеджеру говорят когда включить ту или иную акцию.
  Серебро 10%, золото 5%: !example |
    Скидка на серебро 10%, на золото 5%.
    Сейчас есть сложность с установкой скидки на серебро - приходится выбирать каждый товар отдельно, на который необходимо установить скидку.
    То есть устанавливается общая скидка 5% и второе правило это исключение из общей скидки и туда вручную выбираются товары из серебра.
  Все 10%: !example |
    Скидка на все товары 10%.
  Все 5%: !example |
    Скидка на все товары 5%.
  Ночь скидок: !example |
    Ориентировочно в июне проходит важная акция, которая привлекает много клиентов, которые буквально целиком заполняют магазин. На неё нужно подготовиться заранее.
  Произвольная скидка на произвольные товары: !extension |
    В качестве расширения на будущее хотелось бы видеть возможность формировать произвольное подмножество товаров по набору свойств
    из справочников НИМА на которое можно установить произвольную скидку.
    Например по моделе, бренду, цвету, размеру, плетению, диаметру, товарной группе, товарной подгруппе и т.д. и устанавливать на него скидку.
  Скидка > 10%: !exclusion |
    При использовании акции и дисконтной карты, общая скидка не должна превышать 10%
  Скидка при рассрочке: !exclusion |
    При оплате рассрочкой отключаются все скидки (акционные и по дисконтной карте)


Контент-менеджер: !role
  Мотивация: |
    - Управлять контентом сайта с помощью настроек админки и минорных правок фронтэнда
  Сергей: !example |
    Сергей в нашем случае контент-менеджер. Он включает акции в админке.


