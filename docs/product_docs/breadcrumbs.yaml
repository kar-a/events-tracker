Хлебные крошки: !concept
  описание: |
    Элементы, позволяющие пользователю понимать, где он находится в структуре сайта и как можно вернуться на предыдущий
    уровень. Отображается в каталоге и на детальной странице товара.
    Состоит из ссылок: Главная страница, товарная группу, товарная подгруппа, модель и товар.
    При нажатии на группу, подгруппу или модель происходит переход в каталог товаров с фильтром по выбранной группе,
    подгруппе или модели.
  Главная страница: !example |
    Главная страница сайта.
  Товарная группа: !example |
    Страница каталога товаров с фильтром по выбранной товарной группе.
  Товарная подгруппа: !example |
    Страница каталога товаров с фильтром по выбранной товарной подгруппе.
  Модель: !example |
    Страница каталога товаров с фильтром по выбранной модели.


Пользователь сайта -- Использование хлебных крошек: !func
  Пользователь хочет вернуться на главную страницу: !story
    ситуация:
      - Пользователь находится на детальной странице товара.
      - Вверху страницы видит хлебные крошки.
      - Нажимает на ссылку "Главная страница".
    успех:
      - Пользователь перешел на главную страницу сайта.

  Пользователь хочет вернуться на страницу каталога товаров с фильтром по группе текущего товара: !story
    ситуация:
      - Пользователь находится на странице детальной информации о товаре.
      - Вверху страницы видит хлебные крошки.
      - Нажимает на ссылку следующую после "Главная страница" справа, например "Цепи".
    успех:
      - Пользователь перешел на страницу каталога товаров с фильтром по выбранной товарной группе.

  Пользователь хочет вернуться на страницу каталога товаров с фильтром по подгруппе текущего товара: !story
    ситуация:
      - Пользователь находится на странице детальной информации о товаре.
      - Вверху страницы видит хлебные крошки.
      - Нажимает на ссылку следующую после "Главная страница" и товарной группы справа, например "Цепи жгуты".
    успех:
      - Пользователь перешел на страницу каталога товаров с фильтром по выбранной товарной подгруппе.

  Пользователь хочет вернуться на страницу каталога товаров с фильтром по модели текущего товара: !story
    ситуация:
      - Пользователь находится на странице детальной информации о товаре.
      - Вверху страницы видит хлебные крошки.
      - Нажимает на ссылку следующую после "Главная страница", товарной группы и товарной подгруппы справа, например 
        "Цепи гурмета".
    успех:
      - Пользователь перешел на страницу каталога товаров с фильтром по выбранной модели.
