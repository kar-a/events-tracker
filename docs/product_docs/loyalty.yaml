Программа лояльности: !concept
  определение: |
    Дисконтная карта, которая позволяет клиенту получать скидки на товары и накапливать сумму покупок.
  Золотая: !example |
    Карта лояльности 3%
    При сумме покупок более 5.000
  Шоколадная: !example |
    Карта лояльности 5%
    При сумме покупок более 1.000.000
  Платиновая: !example |
    Карта лояльности 7% в магазине Ярагского, 5% в других магазинах
    При сумме покупок более 5.000.000
