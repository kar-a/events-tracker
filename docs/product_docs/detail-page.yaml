Детальная страница: !concept
  описание: |
    Детальная страница представляет собой сущность модель, при этом содержит конструктор, который позволяет
    переключаться между товарами одной модели без необходимости выходить в общий товарный каталог и искать там.
  Товар для показа: !example |
    Товар у которого есть остатки изделий и фотографии.
  Товар без фотографии: !exclusion |
    Товар у которого нет фотографии, не показывается на сайте.
  Товар без остатков: !exclusion |
    Товар у которого нет остатков изделий, не показывается на сайте.  


Нейминг: !concept
  определение: |
    Публичный идентификатор товара на сайте.
  Продающее название: !example
    Цепь ручной работы из красного золота, плетение верёвочка.
    Составление имени из значений нескольких полей сделано натурально, с соблюдением норм языка.
  Механическое название: !exclusion
    Смартфон Apple iPhone 15 128GB Black (Dual Sim).
    Составление имени из значений нескольких полей сделано искусственно, путем склейки как есть.
  Состав для товара с размером: !example |
    <ним.модель.публич> + <ним.размер.наименование> + размера
  Состав для товара без размера: !example |
    <ним.модель.публич>
  Не показывать 0 в размере: !example |
    Если размер равен 0, то не показывать его в названии товара. 20.0 = 20; 20.5 = 20.5 и т.д.
    БРАСЛЕТ ЯКОРНЫЙ 20.0 РАЗМЕРА = БРАСЛЕТ ЯКОРНЫЙ 20 РАЗМЕРА
    БРАСЛЕТ ЯКОРНЫЙ 20.5 РАЗМЕРА = БРАСЛЕТ ЯКОРНЫЙ 20.5 РАЗМЕРА
  Нейминг модели: !example |
    Формируется из подгруппы и плетения/замка.
    Если заполнено плетение, <подгруппа.публичное_наименование> + <плетение.публичное_наименование>.
    Если не заполнено плетение и заполнен замок, то <подгруппа.публичное_наименование> + <замок.публичное_наименование>.


Фотографии: !concept
  определение: |
    Фотографии прикрепляются в 1С и передаются на сайт имена файлов.
  Фотография подгруппы: !example |
    Для каждой подгруппы одну фотографию. Ракурс_1 - изделие на белом фоне.
  Фотография модели: !example |
    Для каждой модели используется одна фотография. Ракурс_1 - изделие на белом фоне.
  Фотография товара: !example |
    Для каждого товара используется две фотографии. Ракурс_1 и Ракурс_2. Ракурс_1 - изделие на белом
    фоне, Ракурс_2 - изделие на человеке.
  Плейсхолдер: !example |
    Если у модели нет фотографии, то используется фотография рандомного товара из этой модели.
    Если у подгруппы или товара нет фотографии, то используется плейсхолдер.
  Название фото файла: !example |
    Название файла фотографии состоит из штрихкода изделия и ракурса. Расширение файла - .jpeg.
    Пример: 12345678_1.jpeg, 12345678_2.jpeg, 12345678_3.jpeg.
  Название видео файла: !example |
    Название файла видео состоит из штрихкода изделия и ракурса с "v" перед ним. Расширение файла - .mp4. 
    Пример: 12345678_v1.mp4, 12345678_v2.mp4, 12345678_v3.mp4.
    

Элементы детальной страницы: !concept
  Фотографии: !example |
    Содержит галерею с фотографиями товара.
  Видео: !example |
    Возможность просмотра видео товара. Находится в галерее вместе с фотографиями.
  Конструктор: !example |
    Позволяет переключаться между товарами одной модели без необходимости выходить в общий товарный каталог и искать
    там. Показывает поля товара (НИМа), вариативные и не вариативные.
  Характеристики: !example |
    Показывает характеристики модели.
  Доставка: !example |
    Показывает информацию о доставке.
  Оплата: !example |
    Показывает информацию об оплате.
  Гарантии и возврат: !example |
    Показывает информацию о гарантии и возврате.
    

Пользователь -- Использование характеристик: !concept
  Изменить размер: !story
    ситуация:
      - Пользователь находится на детальной странице товара.
      - На конструкторе выбрано


Характеристики: !concept
  определение: |
    Блок на детальной странице товара, который показывает характеристики модели и товара.
    Располагается в сворачиваемой группе.
  Перечень характеристик: !example |
    * Модель
    * Товарная группа
    * Товарная подгруппа
    * Плетение.ПолноеНаименование
    * Вид изготовления
    * Замок
    * Размер
    * Диаметр
    * Цвет.Наименование
    * Вид обработки
    * Проба.НаименованиеМатериала + Проба.Проба
    * Весовой
    * Вес от
  Капитализация: !example |
    Все названия характеристик пишутся с большой буквы.
