Почтовая служба: !concept
  определение: Стороняя компания, которая занимается доставкой товаров.
  EMS: !example
  DPD: !example

Доставка: !concept
  определение: |
    Варианты передачи товара от продавца к покупателю.
  Самовывоз: !example |
    Покупатель самостоятельно забирает товар из магазина ЯРАГ.
  Доставка курьером магазина: !example |
    По Каспийску и Махачкале осуществляется бесплатная доставка курьером магазина при сумме заказа от 3000 руб.
  Доставка почтовой службой: !example |
    По Дагестану, кроме Каспийска и Махачкалы, осуществляется бесплатная доставка EMS при сумме заказа от 3000 руб. DPD не используется.
    По России, кроме Каспийска и Махачкалы, осуществляется платная доставка DPD или EMS.


Менеджер ИМ: !role
  Мотивация: |
    - Отправить клиенту заказ в срок
    - Обеспечить соответствие стоимости заказа и прочих параметров доставки, тому, что клиент видел на сайте


