Набор прав: !concept
  описание: |
    3 блока прав в юникс системах: владелец, группа и остальные. Каждый блок содержит 3 права: чтение, запись и исполнение.
    Ниже 3 вида объектов проекта и их права.
  Файл с расширением PHP, который читает PHP интерпретатор: !example |
    -rw-rw-r-- (664)
  Файл с расширением PHP, который выполняется из CLI: !example |
    -rwxrwxr-- (774)
  Директория:
    drwxrwxr-x (775)


Ownership: !concept
  описание: |
    Файлы и папки имеют владельца пользователя и группу.
  Владелец пользователь (контейнерное окружение): !example |
    В нашей ситуации владелец не важен, т.к. мы даем группе такие же права. И в группу входят все пользователи, которым нужно дать права.
  Владелец пользователь (не контейнерное окружение): !example |
    NGINX, PHP и владелец файлов и директорий один и тот же user -- www-root


Админ -- Установить правильные права проекту: !func
  Установить права в не контейнерном окружении: !story
    ситуация:
      - Чистая ВМ
      - Свежескопированный репозиторий
    успех:
      - Вижу для файлов и директорий правильные права и ownership
      - Вижу, что для всех файлов, директорий, NGINX и PHP одинаковый владелец -- www-root
  Установить права в контейнерном окружении: !story
    ситуация:
      - Чистая ВМ
      - Свежескопированный репозиторий
    успех:
      - Вижу для файлов и директорий правильные права и ownership
      - Создан пользователь container_user на хосте с UID & GID -- 2000