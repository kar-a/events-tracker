# роли
Битрикс: !role
  Старт: API 1C
  Мотивация:
    - Получать актуальные данные по НСИ, балансу дисконтных карт, остаткам изделий
    - Получать данные в удобном формате
    - Отправлять заказы в 1С
  Прод: !example
  Стейджи: !example
  Миррор: !example
    
# концепты
Склады ИМ: !concept
  определение: |
    Склады ИМ - это склады остатки на которых показываем на сайте в качестве доступных к продаже.
    * ТРИМИАТА-ЯРАГ ВИТРИНА
    * ТРИМИАТА-ЯРАГ СЕЙФ
    * ТРИМИАТА-ВОСТ ВИТРИНА
    * ТРИМИАТА-ВОСТ СЕЙФ
    На сайт передается "ЯРАГ", "ВОСТ" или "" (пустая строка).
    Если цена не 0, значит должен стоять склад.


Полный импорт: !concept
  определение: |
    Полный импорт это когда на сайте нет данных и он идёт в 1С на те ручке, которые отдают полные данные, а именно на
    /spec/v1/{entity_name}.
  Ответ по сериям (items, изделия, штрихкоды): !example |
    При полном импорте из всего множества серий в 1С (>600к) возвращается подмножество серий у которых есть НИМ,
    даже если изделия нет на остатках. Наличие на остатке можно определить по наличию названия склада или цене (>0).
    

Синхронизация: !concept
  определение: |
    С момента последнего полного импорта в 1С происходят изменения остатков и НСИ. Синхронизация - это получение этих
    изменений. Осуществляется через ручку /spec/v1/changes.
  Ручка AllChanges: !example |
    В ответе при обращении на ручку /spec/v1/changes возвращается ответ соответствующий схеме AllChanges. Она имеет
    2 поля, message_number и data. Поле data содержит объект со множеством полей соответствующих сущностям НИМ + серии.
    Что касается серий, то для синхронизации попадают серии ранее зарегистрированные в плане обмена. В план обмена
    регистрируются серии, у которых произошло изменение НИМа.


Изменение остатков: !concept
  определение:
    Изменение остатков - это изменение количества сущностей в 1С, не изменение самих сущностей.
  Изменение остатков серий: !example |
    В 1С происходят хозяйственные операции которые приводит к изменению остатка серий, без изменения самой серии.
    * Поступление
    * Перемещение (с/на склад ИМ)
    * Продажа
  Изменение цен серий: !example |
    В 1С происходят хозяйственные операции которые приводит к изменению цены серий, без изменения самой серии.
    * Переоценка
  Изменение суммы накопления дисконтных карт: !example |
    В 1С происходят хозяйственные операции которые приводит к изменению суммы накопления дисконтных карт.
    * Продажа
    * Замена карты
  Изменение подгруппы у модели: !exclusion |
    Подобное действие НЕ является изменением остатков, так как остатки не меняются, а меняется только справочная информация.


Изменение НСИ: !concept
  определение:
    Изменение нормативно-справочной информации - это изменение самих сущностей.
  Изменение серий: !example |
    В 1С происходят хозяйственные операции которые приводит к изменению серий.
    * Подшив серии к НИМу
    * Изменение НИМа у серии
    * Изъятие НИМа у серии
  Изменение дисконтных карт: !example |
    В 1С происходят хозяйственные операции которые приводит к изменению дисконтных карт.
    * Замена номера телефона
  Изменение модели:
    В 1С происходят хозяйственные операции которые приводит к изменению модели.
    * Изменение подгруппы
    * Изменение плетения
    * и др.


# функции
Битрикс -- Выполнить полный импорт: !func
  Импорт серий: !story
    ситуация:
      - Сайт пустой
    старт: Обратиться на ручку /spec/v1/items
    успех:
      - Получил ответ полного импорта серий
    что понадобится:
      - Предварительно импортировать НИМы (товары)


Битрикс -- Выполнить синхронизацию: !func
  Синхронизация серий и остальных НИМ НСИ: !story
    ситуация:
      - В 1С произошли изменения с момента полного импорта
      - Сайт получил уведомление о необходимости синхронизации на свою ручку <путь к ручке> #TODO TRIM-403
    старт: Обратиться на ручку /spec/v1/changes
    успех:
      - Получил ответ имеющий схему AllChanges
      - Ответ содержит массив объектов по пути data.items
      - Схема объекта item аналогична схеме при полном импорте на ручке /spec/v1/items
      - Попали серии у которых было изменение НИМа или остатков
      - Те серии, которых не было битрикс создал, которые были, проверил идентичность НСИ и остатков (цены) и обновил, если необходимо
    что понадобится:
      - Полный импорт сделанный ранее
  Очистить таблицу обмена: !story
    ситуация:
      - Получил ответ с изменениями
      - Записал данные в БД сайта
      - Необходимо очистить таблицу обмена
    старт: Отправить DELETE запрос с номером сообщения в query параметре на ручку /spec/v1/changes
    успех:
      - Получил ответ с кодом 204
      - Таблица обмена очищена


Битрикс -- Выполнить синхронизацию по дисконтным картам: !func
  Синхронизация дисконтных карт: !story
    ситуация:
      - В 1С произошли изменения с дисконтными картами (НСИ или остатки (сумма накопления))
      - Сайт получил уведомление о необходимости синхронизации на свою ручку /1c/synchronize_card
    старт: Обратиться на ручку /v2/affected_cards
    успех:
      - Получил ответ имеющий схему DiscountCard
      - Ответ содержит массив объектов по пути data
      - Попали карты у которых было изменение
      - В ответе получил название вида карты в поле kind, сам понял какой это процент скидки
      - Те карты, которых не было битрикс создал, которые были, проверил идентичность НСИ и суммы накопления и обновил, если необходимо
  Очистить таблицу обмена: !story
    ситуация:
      - Получил ответ с изменениями
      - Записал данные в БД сайта
      - Необходимо очистить таблицу обмена
    старт: Отправить DELETE запрос с номером сообщения в query параметре на ручку /v2/affected_cards
    успех:
      - Получил ответ с кодом 204
      - Таблица обмена очищена
