Гамбургер-меню: !concept
  определение: |
    Меню находится в хедере, на каждой странице сайта. Имеет кнопку с тремя горизонтальными линиями.
    Содержит группы, подгруппы и модели. В левой части выбирается группа, в правой показываются подгруппы выбранной
    категории, при нажатии на подгруппу динамично (без перезагрузки страницы) показываются модели данной подгруппы.
  Меню в состоянии показа подгрупп: !example |
    При открытии меню первая товарная группа уже выбрана, а потому в правой части показываются подгруппы этой группы.
  Меню в состоянии показа моделей: !example |
    При выборе подгруппы в правой части показываются модели этой подгруппы.
  Скрывать единственную модель: !exclusion |
    Если у подгруппы одна модель, то все равно её показывать. Не стоит скрывать модель.


Элементы гамбургер меню: !concept
  определение: |
    Из чего состоит гамбургер меню.
  Товарная группа: !example |
    Текстовая надпись в левой части меню, например "Кольца", "Цепи", "Браслеты" и т.д.
    Слева от надписи пиктограмма с изображением товарной группы.
  Товарная группа без подгрупп: !exclusion |
    Группы у которых нет подгрупп не должны отображаться в меню.
  Товарная подгруппа: !example |
    Карточка в правой части меню с фотографией и текстовой надписью (во множественном числе?), например "браслеты 
    декоративные звеньевые", "цепи", "серьги-подвески" и т.д. Фотография тянется из 1С. Если фотографии нет, то
    показывается плейсхолдер.
  Товарная подгруппа без моделей: !exclusion |
    Подгруппы, в которых нет моделей не должны отображаться в меню.
  Модель: !example |
    Карточка в правой части меню с фотографией и текстовой надписью, появляется после выбора подгруппы, например
    "Цепь панцирная", "Браслет панцирный". Фотография тянется из 1С. Если фотографии нет, то показывается плейсхолдер.
  Модель без товаров: !example |
    Модели, в которых нет товаров не должны отображаться в меню.
  Все товары выбранной товарной группы: !example |
    Меню в состоянии показа подгрупп всегда показывает на первом месте карточку "<имя товарной группы>".
  Кнопка назад: !example |
    Меню в состоянии показа моделей всегда показывает на первом месте карточку "Назад".


Пользователь -- Использование гамбургер меню: !func
  Хочу увидеть все товары определенной товарной группы: !story
    ситуация:
      - Хочу посмотреть все изделия определенной товарной группы
      - Нажал на кнопку с изображением гамбургера.
      - Увидел в левой части названия товарных групп, выбрал нужную
      - Справа появились товарные подгруппы выбранной товарной группы
      - Выбираю первый элемент, который имеет тоже название, что и товарная группа
    старт: Главная страница сайта
    успех:
      - Перешел в каталог и вижу все товары выбранной группы
  Хочу увидеть товары определенной модели: !story
    ситуация:
      - Известно название модели
      - Нажал на кнопку с изображением гамбургера
      - Увидел в левой части названия товарных групп, выбрал нужную
      - Справа появились товарные подгруппы выбранной товарной группы
      - Выбрал нужную подгруппу, без перезагрузки страницы увидел модели этой подгруппы
      - Выбрал нужную модель
    старт: Главная страница сайта
    успех:
      - Перешел в каталог и вижу все товары выбранной модели
