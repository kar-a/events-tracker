Конструктор: !concept
  определение: |
    Конструктор позволяет переключаться между товарами одной модели без необходимости покидать страницу.
  Поля товара: !example |
    Поля НИМа которые нужно показывать в конструкторе: Диаметр, Цвет, Обработка, Проба, Весовой, Размер.
  Вариативное поле: !example |
    Поле, которое может иметь несколько вариантов. Например у модели Х есть товары 1, 2 и 3.
    У товара 1 диаметр 10, у товара 2 диаметр 15, у товара 3 диаметр 20.
    Значит диаметр вариативный для модели Х.
  Невариативное поле: !example |
    Поле, которое имеет одно значение для всех товаров модели.
    Например, у всех товаров модели проба 585, значит проба невариативная.
  Поле всегда вариативное: !exclusion |
    У разных моделей одно и тоже поле может быть вариативным и невариативным.
    Например у модели X все товары имеют желтый цвет, а у модели Y только часть товаров имеют желтый цвет,
    а остальная часть - красный.
  Конструктор: !example |
    Конструктор позволяет переключаться между товарами одной модели без необходимости выходить в общий товарный каталог
    и искать там.
  Показ полей товара: !example |
    Если поле вариативное, то нужно показывать все доступные варианты этого поля. Если поле не вариативное, то нужно
    показывать его значение.
    

Пользователь -- Выбрать другой товар: !func
  Выбрать товар другого цвета: !story
    ситуация:
      - Пользователь находится на странице браслета
      - Выбран желтый цвет, рядом есть красный цвет, он не обведен пунктиром
      - Выбран размер 18
      - Выбран диаметр 1
    старт: Пользователь нажимает на красный цвет
    успех:
      - Вижу перезагруженную страницу с красным браслетом
      - Размер 18
      - Диаметр 1

  Выбрать товар другого размера: !story
    ситуация:
      - Пользователь находится на странице браслета
      - Выбран размер 18, рядом есть размер 19, он не обведен пунктиром
      - Выбран желтый цвет
      - Выбран диаметр 1
    старт: Пользователь нажимает на размер 19
    успех:
      - Вижу перезагруженную страницу с браслетом размера 19
      - Желтый цвет
      - Диаметр 1

  Выбрать товар другого диаметра: !story
    ситуация:
      - Пользователь находится на странице браслета.
      - Выбран диаметр 1, рядом есть диаметр 0.7, он не обведен пунктиром
      - Выбран желтый цвет
      - Выбран размер 18
    старт: Пользователь нажимает на диаметр 0.7
    успех:
      - Вижу перезагруженную страницу с браслетом диаметра 0.7
      - Желтый цвет
      - Размер 18

  Выбрать цвет обведенный пунктиром: !story
    ситуация:
      - Пользователь находится на странице браслета
      - Выбран желтый цвет, рядом есть красный цвет, он обведен пунктиром
      - Выбран размер 18
      - Выбран диаметр 1
    старт: Пользователь нажимает на красный цвет
    успех:
      - Вижу перезагруженную страницу с красным браслетом
      - Прочие параметры подобраны случайным образом
