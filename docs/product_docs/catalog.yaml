Каталог товаров: !concept
  определение: |
    Страница сайта, на которой отображаются все товары выбранной группы/подгруппы/модели.
    Позволяет фильтровать товары по характеристикам и сортировать по цене, популярности и новизне.
  Сайдбар: !example |
    Содержит фильтры по характеристикам товаров.
  Сортировка: !example |
    Позволяет сортировать товары по цене, популярности и новизне.
  Товар: !example |
    Карточка товара, содержит 2 фотографии, название, цену и кнопку "В избранное". Шильдик "новинка".
  Товар для показа: !example |
    Товар у которого есть остатки изделий, фотографии и не исключается установленными фильтрами.
  Товар без фотографии: !exclusion |
    Товар у которого нет фотографии, не показывается на сайте.
    

Сайдбар: !concept
  описание: |
    Блок на странице каталога товаров, который содержит фильтры по характеристикам товаров.
  Фильтр по группам: !example |
    Позволяет выбрать товарную группу.
  Фильтр по свойствам: !example |
    Позволяет выбрать характеристику товара, например "проба", "цвет", "размер".
  Фильтр по цене: !example |
    Позволяет выбрать диапазон цен.
    

Фильтр по группам: !concept
  описание: |
    3-ех уровневый иерархический фильтр в сайдбаре каталога, позволяет посмотреть все товары выбранной
    группы/подгруппы/модели.
  Первый уровень: !example |
    Содержит список всех товарных групп.
    Не имеет пиктограмм.
    Не показываются подгруппы у которых нет моделей.
    Имеет пиктограмму стрелки справа при нажатии на которую группа разворачивается/сворачивается.
    При нажатии на название группы в свернутом состоянии, все остальные группы сворачиваются, а группа разворачивается,
    без перерендера страницы.
    При нажатии на название группы в развернутом состоянии, происходит рендер новой страницы каталога с товарами 
    отфильтрованными по выбранной группе. Что позволяет пользователю посмотреть все товары выбранной группы.
  Второй уровень: !example |
    Содержит список всех подгрупп выбранной товарной группы.
    Не показываются подгруппы у которых нет моделей.
    Имеет пиктограмму стрелки справа при нажатии на которую подгруппа разворачивается/сворачивается.
    При нажатии на название подгруппы в свернутом состоянии, все остальные подгруппы сворачиваются, а подгруппа
    разворачивается, без перерендера страницы.
    При нажатии на название подгруппы в развернутом состоянии, происходит рендер новой страницы каталога с товарами
    отфильтрованными по выбранной подгруппе. Что позволяет пользователю посмотреть все товары выбранной подгруппы.
  Скрывать блок с единственной подкатегорией: !example |
    Если у выбранной товарной группы ровно одна подкатегория, блок подкатегорий (подвидов) не показывать и не добавлять в результат компонента.
  Третий уровень: !example |
    Содержит список всех моделей выбранной подгруппы.
    При нажатии на название модели, происходит рендер новой страницы каталога с товарами отфильтрованными по выбранной
    модели. Что позволяет пользователю посмотреть все товары выбранной модели.
  Скрывать единственную модель: !exclusion |
    Если у подгруппы одна модель, то все равно её показывать. Не стоит скрывать модель.
