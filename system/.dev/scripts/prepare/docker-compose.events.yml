services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: trimiata-events-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: ${CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT}
      TZ: ${TZ}
    volumes:
      - ${EVENTS_DATA_ROOT}/clickhouse/data:/var/lib/clickhouse
      - ${EVENTS_DATA_ROOT}/clickhouse/log:/var/log/clickhouse-server
      - ./sql:/docker-entrypoint-initdb.d:ro
    ports:
      - "${CLICKHOUSE_HTTP_PORT}:8123"
      - "${CLICKHOUSE_TCP_PORT}:9000"
    healthcheck:
      test: [ "CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8123/ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      events_net:
        aliases:
          - clickhouse

  grafana:
    image: grafana/grafana:11.2.0
    container_name: trimiata-events-grafana
    restart: unless-stopped
    user: "472:472"
    command:
      - sh
      - -c
      - |
        if [ ! -f /usr/share/grafana/public/build/manifest.json ] && [ -f /usr/share/grafana/public/build/assets-manifest.json ]; then
          ln -sf assets-manifest.json /usr/share/grafana/public/build/manifest.json
        fi

        # Provisioning: generate ClickHouse datasource with real env values.
        # (Grafana does not reliably expand env vars inside provisioned YAML for plugins.)
        mkdir -p /var/lib/grafana/provisioning/datasources
        mkdir -p /var/lib/grafana/provisioning/dashboards
        cp -r /etc/grafana/provisioning-ro/* /var/lib/grafana/provisioning/ 2>/dev/null || true
        cat > /var/lib/grafana/provisioning/datasources/datasource.generated.yml <<EOF
        apiVersion: 1

        datasources:
          - name: ClickHouse (events)
            type: grafana-clickhouse-datasource
            access: proxy
            isDefault: true
            editable: false
            uid: clickhouse_events
            jsonData:
              host: clickhouse
              port: 8123
              protocol: http
              defaultDatabase: ${CLICKHOUSE_DB}
              username: ${CLICKHOUSE_USER}
              queryTimeout: 0
              secure: false
            secureJsonData:
              password: ${CLICKHOUSE_PASSWORD}
        EOF

        # Debug: ensure provisioning is present (helps when diagnosing "failed to create ClickHouse client")
        ls -la /var/lib/grafana/provisioning || true
        ls -la /var/lib/grafana/provisioning/datasources || true

        exec /run.sh
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SERVER_ENABLE_GZIP: "true"
      GF_INSTALL_PLUGINS: grafana-clickhouse-datasource
      GF_PATHS_PROVISIONING: /var/lib/grafana/provisioning
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${EVENTS_DATA_ROOT}/grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning-ro:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      clickhouse:
        condition: service_healthy
    networks:
      events_net:
        aliases:
          - grafana

  redis:
    image: redis:7.2-alpine
    container_name: trimiata-events-redis
    restart: unless-stopped
    command: [ "sh", "-c", "redis-server --appendonly yes --requirepass \"$${REDIS_PASSWORD}\"" ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      TZ: ${TZ}
    volumes:
      - ${EVENTS_DATA_ROOT}/redis/data:/data
    ports:
      - "${REDIS_PORT}:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      events_net:
        aliases:
          - redis

  collector:
    build:
      context: ./collector/node
      dockerfile: Dockerfile
    container_name: trimiata-events-collector
    restart: unless-stopped
    environment:
      HTTP_HOST: 0.0.0.0
      HTTP_PORT: 8080
      CLICKHOUSE_HTTP_URL: http://clickhouse:8123
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      REDIS_URL: redis://redis:6379
      TZ: ${TZ}
    ports:
      - "${COLLECTOR_PORT}:8080"
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      events_net:
        aliases:
          - collector

networks:
  events_net:
    driver: bridge
